name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and deploy (defaults to the commit SHA)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: cred-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.CRED_AWS_REGION }}
  ECR_REPOSITORY: cred

jobs:
  build-and-push:
    # Native arm64, matching the t4g.micro target — avoids QEMU-emulating
    # aarch64 on an x86_64 runner, which was 5-10x slower for the Go/npm
    # build steps here.
    runs-on: ubuntu-24.04-arm
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
        with: { persist-credentials: false }

      - id: tag
        run: echo "image_tag=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.CRED_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.image_tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.CRED_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deploy command
        id: send
        run: |
          set -euo pipefail
          ENV_FILE=$(mktemp)
          {
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}"
            echo "ECR_IMAGE=${{ vars.CRED_ECR_REPOSITORY_URL }}"
            echo "DB_PASSWORD=${{ secrets.CRED_DB_PASSWORD }}"
            echo "DATABASE_URL=postgres://cred:${{ secrets.CRED_DB_PASSWORD }}@db:5432/cred?sslmode=disable"
            echo "CRED_LLM_API_KEY=${{ secrets.CRED_LLM_API_KEY }}"
            echo "CRED_LLM_BASE_URL=${{ vars.CRED_LLM_BASE_URL }}"
            echo "CRED_LLM_MODEL=${{ vars.CRED_LLM_MODEL }}"
            echo "CRED_WEB_ADDR=:8080"
          } > "$ENV_FILE"

          B64_ENV=$(base64 -w0 "$ENV_FILE")
          REGISTRY="${{ vars.CRED_ECR_REPOSITORY_URL }}"
          REGISTRY="${REGISTRY%%/*}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.CRED_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "cred deploy ${{ needs.build-and-push.outputs.image_tag }}" \
            --parameters "{\"commands\":[\"echo $B64_ENV | base64 -d > /opt/cred/.env\", \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\", \"cd /opt/cred && /usr/libexec/docker/cli-plugins/docker-compose -f docker-compose.deploy.yml pull\", \"cd /opt/cred && /usr/libexec/docker/cli-plugins/docker-compose -f docker-compose.deploy.yml up -d\"]}" \
            --query "Command.CommandId" --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for the command to finish
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.send.outputs.command_id }}" \
              --instance-id "${{ vars.CRED_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.send.outputs.command_id }}" \
                --instance-id "${{ vars.CRED_INSTANCE_ID }}"
              exit 1
            fi
            sleep 10
          done
          echo "timed out waiting for command"
          exit 1
